model_list:
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514

guardrails:
  - guardrail_name: "control-bash-commands"
    litellm_params:
      guardrail: tool_permission
      mode: post_call
      default_on: true
      default_action: "allow"
      on_disallowed_action: "block"
      rules:
        - id: "block_docker_push"
          tool_name: "^Bash$"
          decision: "deny"
          allowed_param_patterns:
            command: ".*\\bdocker\\s+push\\b.*"

general_settings:
  master_key: sk-test-master-key
  database_url: "postgresql://postgres:testpass@localhost:5433/litellm"
  store_model_in_db: true
  store_prompts_in_spend_logs: true
